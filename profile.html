<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2c3e50">
    <link rel="manifest" href="manifest.json">
    <title>User Profile</title>
    <link rel="stylesheet" href="nav.css">
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="profile.css">
</head>
<body>
    <!-- Shared Navigation -->
    <div id="navWrapper"></div>

    <!-- Main Content -->
    <div class="main-content" id="mainContent">
        <div class="profile-container">
            <div class="profile-header">
                <h1>User Profile</h1>
                <p>Manage your account settings and information</p>
            </div>

            <div id="alertMessage" class="alert"></div>
            
            <div class="profile-section">
                <h3>Account Information</h3>
                <div class="user-info" id="userInfo">
                    <p><strong>Email:</strong> <span id="userEmail">Loading...</span></p>
                    <p><strong>Account Type:</strong> <span id="userRole">Loading...</span></p>
                    <p><strong>Member Since:</strong> <span id="userCreated">Loading...</span></p>
                </div>
            </div>

            <div class="profile-section">
                <h3>Change Password</h3>
                <form id="passwordForm">
                    <div class="form-group">
                        <label for="newPassword">New Password</label>
                        <input type="password" id="newPassword" required minlength="6">
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm New Password</label>
                        <input type="password" id="confirmPassword" required minlength="6">
                    </div>
                    <div class="loading" id="passwordLoading">
                        <div class="spinner"></div>
                        <p>Updating password...</p>
                    </div>
                    <button type="submit" class="btn btn-success">Update Password</button>
                    <button type="button" class="btn btn-secondary" onclick="clearPasswordForm()">Clear Form</button>
                </form>
            </div>

            <div class="profile-section">
                <h3>Account Actions</h3>
                <button class="btn btn-secondary" onclick="window.location.href='index.html'">Back to Home</button>
            </div>
        </div>
    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <!-- Our Nav Script -->
    <script src="nav.js"></script>
    <script src="firebase-config.js"></script>
    <script src="auth-utils.js"></script>
    <script>
        const db = window.db;
        const mainContent = document.getElementById('mainContent');
        const alertMessage = document.getElementById('alertMessage');
        const passwordForm = document.getElementById('passwordForm');

        // Show/hide loading spinners
        function setLoading(isLoading, type) {
            const loadingDiv = document.getElementById(`${type}Loading`);
            if (loadingDiv) {
                loadingDiv.style.display = isLoading ? 'block' : 'none';
            }
        }

        // Show alert messages
        function showAlert(message, type = 'success') {
            alertMessage.textContent = message;
            alertMessage.className = `alert alert-${type}`;
            alertMessage.style.display = 'block';
            setTimeout(() => {
                alertMessage.style.display = 'none';
            }, 5000);
        }

        requireAuth().then(({ user }) => {
            mainContent.style.display = 'block';
            loadUserProfile(user);
        });

        // Load user profile data
        async function loadUserProfile(user) {
            document.getElementById('userEmail').textContent = user.email || '';
            const creationTime = user.metadata && user.metadata.creationTime
                ? new Date(user.metadata.creationTime).toLocaleDateString()
                : '—';
            document.getElementById('userCreated').textContent = creationTime;
            document.getElementById('userRole').textContent = 'Loading...';
            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                document.getElementById('userRole').textContent = userDoc.exists ? (userDoc.data().role || 'user') : 'user';
            } catch (err) {
                console.error('Error loading profile:', err);
                document.getElementById('userRole').textContent = 'user';
                showAlert('Could not load account details. Check your connection and refresh.', 'error');
            }
        }

        // Update user's password
        passwordForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword !== confirmPassword) {
                showAlert('New passwords do not match.', 'error');
                return;
            }

            const user = auth.currentUser;
            if (!user) {
                showAlert('No user is signed in. Please refresh and try again.', 'error');
                return;
            }

            setLoading(true, 'password');

            try {
                await user.updatePassword(newPassword);
                showAlert('Password updated successfully!', 'success');
                clearPasswordForm();
            } catch (error) {
                console.error('Password Update Error:', error);
                showAlert(`Error: ${error.message}`, 'error');
            } finally {
                setLoading(false, 'password');
            }
        });

        // Clear the password form
        function clearPasswordForm() {
            document.getElementById('newPassword').value = '';
            document.getElementById('confirmPassword').value = '';
        }
    </script>
</body>
</html>
