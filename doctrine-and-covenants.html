<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2c3e50">
    <link rel="manifest" href="manifest.json">
    <title>Doctrine & Covenants Insights</title>
    <link rel="stylesheet" href="nav.css">
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="insights.css">
    <script src="app-config.js"></script>
    <script src="tinymce-loader.js"></script>
    <script src="email-notifications.js"></script>
</head>
<body>
    <!-- Shared Navigation -->
    <div id="navWrapper"></div>

    <!-- Main Content -->
    <div class="main-content" id="mainContent">
        <div class="container" style="display:none;">
            <h1>Doctrine & Covenants Insights</h1>
            <button id="addInsightBtn" class="btn" style="margin-bottom: 20px; display:none;">Add Main Insight</button>
            <div id="insights-list"></div>
            <div id="loadMoreWrap" style="text-align:center; margin-top: 20px; display:none;">
                <button id="loadMoreBtn" class="btn">Load More</button>
            </div>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div id="insightModal" class="modal">
        <div class="modal-content modal-content--wide">
            <h2 id="modalTitle">Add Insight</h2>
            <form id="insightForm">
                <input type="hidden" id="insightId">
                <input type="hidden" id="relatedToId">
                <input type="text" id="insightTitle" placeholder="Title" required style="width:100%;margin-bottom:10px;">
                <div id="quillEditor" style="height:300px;margin-bottom:20px;"></div>
                <textarea id="insightSummary" placeholder="Summary (optional, for main insights)" style="width:100%; height: 60px; margin-bottom:10px;"></textarea>
                <input type="text" id="insightTags" placeholder="Tags (comma separated)" style="width:100%;margin-bottom:10px;">
                <div style="margin-bottom: 15px;">
                    <label style="display: flex; align-items: center; cursor: pointer;">
                        <input type="checkbox" id="sendEmailNotification" style="margin-right: 8px;">
                        Send email notification to users about this insight
                    </label>
                </div>
                <button type="submit" class="btn">Save Insight</button>
                <button type="button" class="btn" id="cancelModalBtn" style="background:#aaa;">Cancel</button>
            </form>
        </div>
    </div>


    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <script src="nav.js"></script>
    <script src="firebase-config.js"></script>
    <script src="image-upload.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <script src="sanitize.js"></script>
    <script src="auth-utils.js"></script>
    <script>
        const db = window.db;
        const container = document.querySelector('.container');
        const insightsList = document.getElementById('insights-list');
        const addInsightBtn = document.getElementById('addInsightBtn');

        let quill;
        let currentUserRole = null;
        const collectionName = 'insights';
        const PAGE_SIZE = 20;
        let allInsights = [];
        let lastDoc = null;
        let editorContentToSet = null;

        // --- Modal Handling ---
        const modal = document.getElementById('insightModal');
        const modalTitle = document.getElementById('modalTitle');
        const form = document.getElementById('insightForm');
        const cancelBtn = document.getElementById('cancelModalBtn');

        // Initialize TinyMCE on the insight editor
        function openModal() {
          // Destroy any existing TinyMCE instance
          if (window.tinymce && tinymce.get('quillEditor')) {
            tinymce.get('quillEditor').remove();
          }

          tinymce.init({
            selector: '#quillEditor',
            height: 300,
            menubar: false,
            plugins: [
                'advlist', 'autolink', 'lists', 'link', 'image', 'charmap', 'preview', 'anchor',
                'searchreplace', 'visualblocks', 'code', 'fullscreen',
                'insertdatetime', 'media', 'table', 'help', 'wordcount'
            ],
            toolbar: [
                'undo redo | blocks | bold italic underline strikethrough | forecolor backcolor | alignleft aligncenter alignright alignjustify',
                'bullist numlist outdent indent | link image table | removeformat | help'
            ],
            content_style: 'body { font-family:Helvetica,Arial,sans-serif; font-size:14px }',
            automatic_uploads: true,
            images_upload_handler: window.ImageUpload.handler,
            setup: function(editor) {
                editor.on('init', function() {
                    if (editorContentToSet !== null) {
                        editor.setContent(editorContentToSet);
                        editorContentToSet = null;
                    }
                });
            }
          });

          modal.style.display = 'block';
        }

        function closeModal() {
          modal.style.display = 'none';
          form.reset();
          if (window.tinymce && tinymce.get('quillEditor')) {
            tinymce.get('quillEditor').remove();
          }
          document.getElementById('insightId').value = '';
          document.getElementById('relatedToId').value = '';
        }

        cancelBtn.onclick = closeModal;

        // --- CRUD Functions ---
        function renderInsightsList(insights) {
            insightsList.innerHTML = '';
            const mainInsights = insights.filter(i => !i.relatedTo && !i.parentId);
            mainInsights.forEach(mainInsight => {
                const mainCard = document.createElement('div');
                mainCard.className = 'insight-card main-insight';
                let adminControls = '';
                if (currentUserRole === 'admin' || currentUserRole === 'editor') {
                    adminControls = `
                        <div class="insight-actions">
                            <button class="btn" onclick="editInsight('${mainInsight.id}')">Edit</button>
                            <button class="btn" onclick="deleteInsight('${mainInsight.id}')">Delete</button>
                            <button class="btn" onclick="openAddRelatedModal('${mainInsight.id}')">Add Related Insight</button>
                            <button class="btn" onclick="resendEmailNotification('${mainInsight.id}')" style="background: #e67e22;">
                                <svg viewBox="0 0 24 24" style="width: 16px; height: 16px; margin-right: 5px; vertical-align: middle;"><path fill="currentColor" d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>Resend Email
                            </button>
                        </div>
                    `;
                }
                mainCard.innerHTML = `
                    <a href="insight-scripture.html?id=${mainInsight.id}&collection=insights" class="insight-link">
                        <div class="insight-title">${sanitize(mainInsight.title)}</div>
                    </a>
                    ${adminControls}
                `;
                insightsList.appendChild(mainCard);
                const subInsights = [];
                if (mainInsight.relatedInsights && Array.isArray(mainInsight.relatedInsights)) {
                    mainInsight.relatedInsights.forEach(subId => {
                        const subInsight = insights.find(i => i.id === subId);
                        if (subInsight) subInsights.push(subInsight);
                    });
                }
                if (subInsights.length > 0) {
                    const subInsightsContainer = document.createElement('div');
                    subInsightsContainer.className = 'sub-insights-list';
                    let subInsightsHTML = '<h4>Related Insights:</h4><ul>';
                    subInsights.forEach(subInsight => {
                        let subAdminControls = '';
                        if (currentUserRole === 'admin' || currentUserRole === 'editor') {
                            subAdminControls = `
                            <span class="sub-insight-actions">
                                <button class="icon-btn" onclick="editInsight('${subInsight.id}')" title="Edit Insight"><svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"></path></svg></button>
                                <button class="icon-btn" onclick="deleteInsight('${subInsight.id}')" title="Delete Insight"><svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"></path></svg></button>
                            </span>`;
                        }
                        subInsightsHTML += `<li><a href="insight-scripture.html?id=${subInsight.id}&collection=insights">${sanitize(subInsight.title)}</a>${subAdminControls}</li>`;
                    });
                    subInsightsHTML += '</ul>';
                    subInsightsContainer.innerHTML = subInsightsHTML;
                    mainCard.appendChild(subInsightsContainer);
                }
            });
        }

        async function fetchInsights(append) {
            if (!append) {
                allInsights = [];
                lastDoc = null;
                insightsList.innerHTML = 'Loading...';
                document.getElementById('loadMoreWrap').style.display = 'none';
            } else {
                document.getElementById('loadMoreBtn').disabled = true;
            }
            try {
                let query = db.collection(collectionName)
                    .where('category', '==', 'Doctrine & Covenants')
                    .orderBy('created', 'desc')
                    .limit(PAGE_SIZE);
                if (lastDoc) query = query.startAfter(lastDoc);
                const snapshot = await query.get();
                snapshot.forEach(doc => { allInsights.push({ id: doc.id, ...doc.data() }); });
                if (snapshot.docs.length > 0) lastDoc = snapshot.docs[snapshot.docs.length - 1];
                let subInsightIdsToFetch = [];
                allInsights.forEach(insight => {
                    if (insight.relatedInsights && Array.isArray(insight.relatedInsights)) {
                        insight.relatedInsights.forEach(subId => {
                            if (!allInsights.some(i => i.id === subId)) subInsightIdsToFetch.push(subId);
                        });
                    }
                });
                if (subInsightIdsToFetch.length > 0) {
                    const uniqueSubInsightIds = [...new Set(subInsightIdsToFetch)];
                    const CHUNK_SIZE = 10;
                    for (let i = 0; i < uniqueSubInsightIds.length; i += CHUNK_SIZE) {
                        const chunk = uniqueSubInsightIds.slice(i, i + CHUNK_SIZE);
                        const subSnap = await db.collection(collectionName)
                            .where(firebase.firestore.FieldPath.documentId(), 'in', chunk)
                            .get();
                        subSnap.forEach(doc => { allInsights.push({ id: doc.id, ...doc.data() }); });
                    }
                }
                if (allInsights.length === 0) insightsList.innerHTML = '<p>No insights found for this category.</p>';
                else renderInsightsList(allInsights);
                document.getElementById('loadMoreWrap').style.display = (snapshot.docs.length >= PAGE_SIZE) ? 'block' : 'none';
            } catch (error) {
                console.error("Error fetching insights:", error);
                insightsList.innerHTML = '<p>Error loading insights. Please try again later.</p>';
                document.getElementById('loadMoreWrap').style.display = 'none';
            } finally {
                document.getElementById('loadMoreBtn').disabled = false;
            }
        }

        document.getElementById('loadMoreBtn').addEventListener('click', () => fetchInsights(true));

        addInsightBtn.onclick = () => {
            modalTitle.textContent = "Add Main Insight";
            form.reset();
            document.getElementById('insightId').value = '';
            document.getElementById('relatedToId').value = '';
            openModal();
            if (window.tinymce && tinymce.get('quillEditor')) {
                tinymce.get('quillEditor').setContent('');
            }
        };

        window.openAddRelatedModal = (parentId) => {
            modalTitle.textContent = "Add Related Insight";
            document.getElementById('relatedToId').value = parentId;
            openModal();
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('insightId').value;
            const relatedToId = document.getElementById('relatedToId').value;
            const editorContent = tinymce.get('quillEditor').getContent();
            if (!editorContent || editorContent.trim() === "") {
                alert("Content cannot be empty.");
                return;
            }
            const insightData = {
                title: document.getElementById('insightTitle').value,
                content: editorContent,
                summary: document.getElementById('insightSummary').value,
                tags: document.getElementById('insightTags').value.split(',').map(t => t.trim()),
                created: firebase.firestore.FieldValue.serverTimestamp(),
                relatedTo: relatedToId || null,
                category: 'Doctrine & Covenants'
            };

            let insightId = id;
            let isNewInsight = !id;

            try {
                if (id) { // Editing
                    await db.collection(collectionName).doc(id).update(insightData);
                } else { // Creating
                    const docRef = await db.collection(collectionName).add(insightData);
                    insightId = docRef.id;
                    insightData.id = insightId;
                }

                if (isNewInsight && relatedToId) {
                    await db.collection(collectionName).doc(relatedToId).update({
                        relatedInsights: firebase.firestore.FieldValue.arrayUnion(insightId)
                    });
                }
            } catch (err) {
                console.error('Error saving insight:', err);
                alert('Failed to save insight. ' + err.message);
                return;
            }

            // Handle email notification for new insights
            const sendEmailNotification = document.getElementById('sendEmailNotification').checked;
            if (sendEmailNotification && isNewInsight) {
                const currentUser = auth.currentUser;
                if (currentUser) {
                    const userDoc = await db.collection('users').doc(currentUser.uid).get();
                    if (userDoc.exists) {
                        insightData.creatorName = userDoc.data().name || currentUser.email.split('@')[0];
                    }
                }
                setTimeout(() => {
                    window.EmailNotifications.showEmailNotificationModal(insightData, true);
                }, 500);
            }

            closeModal();
            fetchInsights();
        });

        window.editInsight = async (id) => {
            modalTitle.textContent = "Edit Insight";
            const doc = await db.collection(collectionName).doc(id).get();
            if (doc.exists) {
                const data = doc.data();
                editorContentToSet = data.content || "";
                openModal();
                document.getElementById('insightId').value = id;
                document.getElementById('relatedToId').value = data.relatedTo || "";
                document.getElementById('insightTitle').value = data.title;
                document.getElementById('insightSummary').value = data.summary || "";
                document.getElementById('insightSections').value = data.sections || "";
                document.getElementById('sendEmailNotification').checked = false;
            }
        }

        window.deleteInsight = async (id) => {
            const doc = await db.collection(collectionName).doc(id).get();
            if (!doc.exists) return;
            const data = doc.data();

            if (data.relatedTo) {
                if (!confirm("Delete this related insight?")) return;
                await db.collection(collectionName).doc(id).delete();
                await db.collection(collectionName).doc(data.relatedTo).update({
                    relatedInsights: firebase.firestore.FieldValue.arrayRemove(id)
                }).catch(() => {});
            } else {
                const children = data.relatedInsights && data.relatedInsights.length > 0 ? data.relatedInsights : [];
                const msg = children.length > 0
                    ? `This main insight has ${children.length} related insight(s). Delete the main insight AND all related insights?`
                    : "Delete this main insight?";
                if (!confirm(msg)) return;
                for (const childId of children) {
                    await db.collection(collectionName).doc(childId).delete().catch(() => {});
                }
                await db.collection(collectionName).doc(id).delete();
            }
            fetchInsights();
        }

        window.resendEmailNotification = async (id) => {
            try {
                const doc = await db.collection(collectionName).doc(id).get();
                if (doc.exists) {
                    const insightData = { id: doc.id, ...doc.data() };
                    
                    // Get current user info for the notification
                    const currentUser = auth.currentUser;
                    if (currentUser) {
                        const userDoc = await db.collection('users').doc(currentUser.uid).get();
                        if (userDoc.exists) {
                            insightData.creatorName = userDoc.data().name || currentUser.email.split('@')[0];
                        }
                    }
                    
                    window.EmailNotifications.showEmailNotificationModal(insightData, false);
                }
            } catch (error) {
                console.error('Error loading insight for email notification:', error);
                alert('Error loading insight data. Please try again.');
            }
        }

        // --- Auth Handling ---
        container.style.display = 'none';
        requireAuth().then(({ user, role }) => {
            container.style.display = 'block';
            if (isEditorOrAdmin(role)) {
                currentUserRole = role;
                addInsightBtn.style.display = 'block';
            }
            fetchInsights();
        });
    </script>
</body>
</html>
