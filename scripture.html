<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scripture Insights</title>
    <link rel="stylesheet" href="nav.css">
    <style>
        .container { max-width: 800px; margin: 40px auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px #0001; padding: 30px; text-align: center; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 30px; }
        
        .main-content {
            transition: margin-left 0.3s ease;
        }

        @media (max-width: 768px) {
            .main-content {
                margin-left: 0;
            }
        }

        #login-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 0;
        }
        #loginForm {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 250px;
        }
        .btn { background: #3498db; color: #fff; border: none; border-radius: 4px; padding: 8px 16px; cursor: pointer; margin-right: 8px; }
    </style>
</head>
<body>
    <!-- Shared Navigation -->
    <div id="navWrapper"></div>

    <!-- Main Content -->
    <div class="main-content" id="mainContent">
        <div class="container" id="mainWidget" style="display:none;">
            <h1>Scripture Insights</h1>
            <a class="section-link" href="old-testament.html">Old Testament</a>
            <a class="section-link" href="new-testament.html">New Testament</a>
            <a class="section-link" href="book-of-mormon.html">Book of Mormon</a>
            <a class="section-link" href="doctrine-and-covenants.html">Doctrine & Covenants</a>
            <a class="section-link" href="pearl-of-great-price.html">Pearl of Great Price</a>
        </div>
         <!-- Login Form -->
         <div id="login-section" style="display:none;">
            <h2>Login</h2>
            <form id="loginForm">
                <input type="email" id="loginEmail" placeholder="Email" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <button type="submit" class="btn">Login</button>
            </form>
            <button id="resetPasswordBtn" class="btn" style="margin-top:10px;">Forgot Password?</button>
            <div id="loginError" style="color:red; margin-top:10px;"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="nav.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        const auth = window.auth;
        const container = document.querySelector('.container');
        
        container.style.display = 'none';

        auth.onAuthStateChanged(user => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            container.style.display = 'block';
        });
    </script>
</body>
</html>
