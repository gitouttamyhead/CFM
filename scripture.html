<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2c3e50">
    <link rel="manifest" href="manifest.json">
    <title>Scripture Insights</title>
    <link rel="stylesheet" href="nav.css">
    <link rel="stylesheet" href="shared.css">
</head>
<body>
    <!-- Shared Navigation -->
    <div id="navWrapper"></div>

    <!-- Main Content -->
    <div class="main-content" id="mainContent">
        <div class="container" id="mainWidget" style="display:none;">
            <h1>Scripture Insights</h1>
            <a class="section-link" href="old-testament.html">Old Testament</a>
            <a class="section-link" href="new-testament.html">New Testament</a>
            <a class="section-link" href="book-of-mormon.html">Book of Mormon</a>
            <a class="section-link" href="doctrine-and-covenants.html">Doctrine & Covenants</a>
            <a class="section-link" href="pearl-of-great-price.html">Pearl of Great Price</a>
        </div>
         <!-- Login Form -->
         <div id="login-section" style="display:none;">
            <h2>Login</h2>
            <form id="loginForm">
                <input type="email" id="loginEmail" placeholder="Email" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <button type="submit" class="btn">Login</button>
            </form>
            <button id="resetPasswordBtn" class="btn" style="margin-top:10px;">Forgot Password?</button>
            <div id="loginError" style="color:red; margin-top:10px;"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="nav.js"></script>
    <script src="firebase-config.js"></script>
    <script src="auth-utils.js"></script>
    <script>
        const container = document.querySelector('.container');
        container.style.display = 'none';
        requireAuth().then(() => { container.style.display = 'block'; });
    </script>
</body>
</html>
