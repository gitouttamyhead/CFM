# CFM static site — ensure HTML is served with correct Content-Type
[build]
  publish = "."
  # No build command; static HTML/JS/CSS

# Pretty URL: /search returns search.html (rewrite so browser gets HTML)
[[redirects]]
  from = "/search"
  to = "/search.html"
  status = 200

# Force HTML to be served as text/html (fixes raw source showing in browser)
[[headers]]
  for = "/*.html"
  [headers.values]
    Content-Type = "text/html; charset=utf-8"

[[headers]]
  for = "/search"
  [headers.values]
    Content-Type = "text/html; charset=utf-8"
