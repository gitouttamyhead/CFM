<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2c3e50">
    <link rel="manifest" href="manifest.json">
    <title>Come Follow Me - Home</title>
    <link rel="stylesheet" href="nav.css">
    <link rel="stylesheet" href="shared.css">
    <style>
        .container#mainWidget { max-width: 600px; text-align: center; }
        .btn { width: 100%; }
        .recently-added .recent-item { display: block; padding: 10px 0; border-bottom: 1px solid #eee; text-decoration: none; color: #2c3e50; }
        .recently-added .recent-item:last-child { border-bottom: none; }
        .recently-added .recent-item:hover { color: #3498db; }
        .recently-added .recent-meta { font-size: 0.85em; color: #7f8c8d; margin-top: 4px; }
        .recently-added .recent-badge { display: inline-block; background: #ecf0f1; color: #5e239d; padding: 2px 8px; border-radius: 4px; font-size: 0.75em; margin-right: 8px; }
    </style>
</head>
<body style="opacity: 0; transition: opacity 0.3s;">
    <!-- Shared Navigation -->
    <div id="navWrapper" style="display: none;"></div>

    <!-- Main Content -->
    <div class="main-content" id="mainContent">
        <div class="container" id="mainWidget" style="display:none;">
            <h1>Come Follow Me</h1>
            <a class="section-link" href="scripture.html">Scripture Insights</a>
            <a class="section-link" href="gospel.html">Gospel Topics</a>
            <a class="section-link" href="other.html">Other Insights</a>
            <section id="recentlyAddedSection" class="recently-added" style="margin-top: 28px; text-align: left;">
                <h2 style="font-size: 1.2em; color: #2c3e50; margin-bottom: 12px;">Recently Added</h2>
                <div id="recentlyAddedList"></div>
            </section>
        </div>
        <!-- Login Form -->
        <div class="container" id="login-section">
            <h2>Login</h2>
            <form id="loginForm">
                <input type="email" id="loginEmail" placeholder="Email" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <button type="submit" class="btn">Login</button>
            </form>
            <button id="resetPasswordBtn" class="btn" style="margin-top:10px;">Forgot Password?</button>
            <div id="loginError" style="color:red; margin-top:10px;"></div>
        </div>
    </div>

    <!-- Set Password Modal -->
    <div id="setPasswordModal" class="modal" style="display:none;">
        <div class="modal-content">
            <h2>Welcome! Please set your password.</h2>
            <p>To make future logins easier, please create a password for your account.</p>
            <form id="setPasswordForm">
                <input type="password" id="newPassword" placeholder="New Password" required style="width: calc(100% - 22px); margin-bottom:10px; padding: 10px; border-radius: 4px; border: 1px solid #ccc;">
                <input type="password" id="confirmPassword" placeholder="Confirm Password" required style="width: calc(100% - 22px); margin-bottom:20px; padding: 10px; border-radius: 4px; border: 1px solid #ccc;">
                <button type="submit" class="btn">Set Password</button>
                <div id="passwordError" style="color:red; margin-top:10px;"></div>
            </form>
        </div>
    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <!-- Our Nav Script -->
    <script src="nav.js"></script>
    <script src="firebase-config.js"></script>
    <!-- Firebase Auth and Page Logic -->
    <script>
    const db = window.db;
    const auth = window.auth;
    window.currentUserRole = null;

    auth.onAuthStateChanged(async user => {
        const loginSection = document.getElementById('login-section');
        const mainWidget = document.getElementById('mainWidget');
        const adminNavItem = document.querySelector('#adminNavItem');
        const navWrapper = document.getElementById('navWrapper');

        if (user) {
            navWrapper.style.display = 'block';
            loginSection.style.display = 'none';
            mainWidget.style.display = 'block';

            const userDocRef = db.collection('users').doc(user.uid);
            const userDoc = await userDocRef.get();
            
            if (userDoc.exists && userDoc.data().role === 'admin') {
                adminNavItem.style.display = 'block';
            } else {
                adminNavItem.style.display = 'none';
            }

            loadRecentlyAdded();
        } else {
            navWrapper.style.display = 'none';
            loginSection.style.display = 'block';
            mainWidget.style.display = 'none';
            adminNavItem.style.display = 'none';
        }
    });

    function getDetailPageUrl(insight) {
        const id = insight.id;
        if (insight.sourceCollection === 'gospelInsights') return `insight-gospel.html?id=${id}&collection=gospelInsights`;
        if (insight.sourceCollection === 'otherInsights') return `insight-other.html?id=${id}&collection=otherInsights`;
        return `insight-scripture.html?id=${id}&collection=insights`;
    }

    function getCategoryLabel(insight) {
        if (insight.sourceCollection === 'gospelInsights') return 'Gospel Topics';
        if (insight.sourceCollection === 'otherInsights') return 'Other';
        return insight.category || 'Scripture';
    }

    async function loadRecentlyAdded() {
        const listEl = document.getElementById('recentlyAddedList');
        if (!listEl) return;
        listEl.innerHTML = '<span class="loading-message">Loading…</span>';
        try {
            const [insightsSnap, gospelSnap, otherSnap] = await Promise.all([
                db.collection('insights').orderBy('created', 'desc').limit(5).get(),
                db.collection('gospelInsights').orderBy('created', 'desc').limit(5).get(),
                db.collection('otherInsights').orderBy('created', 'desc').limit(5).get()
            ]);
            const items = [];
            insightsSnap.forEach(doc => items.push({ id: doc.id, ...doc.data(), sourceCollection: 'insights' }));
            gospelSnap.forEach(doc => items.push({ id: doc.id, ...doc.data(), sourceCollection: 'gospelInsights' }));
            otherSnap.forEach(doc => items.push({ id: doc.id, ...doc.data(), sourceCollection: 'otherInsights' }));
            const getCreatedTime = (item) => {
                const c = item.created;
                if (!c) return 0;
                return c.toDate ? c.toDate().getTime() : new Date(c).getTime();
            };
            items.sort((a, b) => getCreatedTime(b) - getCreatedTime(a));
            const recent = items.slice(0, 5);
            if (recent.length === 0) {
                listEl.innerHTML = '<p class="loading-message">No insights yet.</p>';
                return;
            }
            listEl.innerHTML = recent.map(insight => {
                const created = insight.created;
                const dateStr = created ? (created.toDate ? new Date(created.toDate()).toLocaleDateString() : new Date(created).toLocaleDateString()) : '';
                const title = (insight.title || 'Untitled').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                const category = getCategoryLabel(insight).replace(/</g, '&lt;').replace(/>/g, '&gt;');
                const url = getDetailPageUrl(insight);
                return `<a href="${url}" class="recent-item"><span class="recent-badge">${category}</span>${title}<div class="recent-meta">${dateStr}</div></a>`;
            }).join('');
        } catch (err) {
            console.error('Error loading recently added:', err);
            listEl.innerHTML = '<p class="error-message">Could not load recent insights.</p>';
        }
    }

    // Prevents flash of unstyled content
    document.addEventListener('DOMContentLoaded', () => {
        document.body.style.opacity = 1;
    });

    // Login form handler
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const errorDiv = document.getElementById('loginError');
        
        try {
            errorDiv.textContent = '';
            await auth.signInWithEmailAndPassword(email, password);
        } catch (error) {
            console.error('Login error:', error);
            errorDiv.textContent = error.message;
        }
    });

    // Password reset handler
    document.getElementById('resetPasswordBtn').addEventListener('click', async () => {
        const email = document.getElementById('loginEmail').value;
        const errorDiv = document.getElementById('loginError');
        
        if (!email) {
            errorDiv.textContent = 'Please enter your email address first.';
            return;
        }
        
        try {
            errorDiv.textContent = '';
            await auth.sendPasswordResetEmail(email);
            errorDiv.textContent = 'Password reset email sent! Check your inbox.';
            errorDiv.style.color = 'green';
        } catch (error) {
            console.error('Password reset error:', error);
            errorDiv.textContent = error.message;
            errorDiv.style.color = 'red';
        }
    });

    // Set password form handler (for new users)
    document.getElementById('setPasswordForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const errorDiv = document.getElementById('passwordError');
        
        if (newPassword !== confirmPassword) {
            errorDiv.textContent = 'Passwords do not match.';
            return;
        }
        
        try {
            errorDiv.textContent = '';
            await auth.currentUser.updatePassword(newPassword);
            document.getElementById('setPasswordModal').style.display = 'none';
        } catch (error) {
            console.error('Password update error:', error);
            errorDiv.textContent = error.message;
        }
    });
    </script>
</body>
</html>
