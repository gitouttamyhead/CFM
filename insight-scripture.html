<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scripture Insight</title>
    <link rel="stylesheet" href="nav.css">
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="insights.css">
    <script src="https://cdn.tiny.cloud/1/ewx52xiayai247q9zlnoay8tigea0svtpwbigdrpuizkxj7j/tinymce/6/tinymce.min.js" referrerpolicy="origin"></script>
</head>
<body>
    <!-- Shared Navigation -->
    <div id="navWrapper"></div>

    <!-- Main Content -->
    <div class="main-content" id="mainContent">
        <div class="container" style="display:none;">
            <div class="top-actions" style="margin-bottom: 20px;">
                <button class="btn btn-secondary" onclick="history.back()">&larr; Back</button>
            </div>
            <h1 id="insightTitle"></h1>
            <div id="insightTags"></div>
            <div id="insightContent" class="insight-content"></div>
            <div id="relatedInsights" class="related-insights-list" style="margin-top: 20px;"></div>
            <div class="insight-actions">
                <button class="btn" id="printBtn">Print with Notes</button>
                <button class="btn" id="createRelatedBtn" style="display:none; background: #27ae60; margin-right: 10px;">Create Related Insight</button>
            </div>

            <div class="bottom-actions" style="margin-top: 20px;">
                <button class="btn btn-secondary" onclick="history.back()">&larr; Back</button>
            </div>
        </div>
        <!-- Notes Section for Printing -->
        <div id="notes-section" style="display: none;">
            <h2>Notes</h2>
            <div class="note-line"></div>
            <div class="note-line"></div>
            <div class="note-line"></div>
            <div class="note-line"></div>
            <div class="note-line"></div>
            <div class="note-line"></div>
            <div class="note-line"></div>
            <div class="note-line"></div>
            <div class="note-line"></div>
            <div class="note-line"></div>
        </div>
    </div>
    
    <!-- Related Insight Modal -->
    <div id="relatedModal" class="modal">
        <div class="modal-content modal-content--wide">
            <h2 id="relatedModalTitle">Create Related Insight</h2>
            <form id="relatedForm">
                <input type="text" id="relatedTitle" placeholder="Title" required style="width:100%;margin-bottom:10px;">
                <div id="relatedQuillEditor" style="height:400px;margin-bottom:20px;"></div>
                <input type="text" id="relatedTags" placeholder="Tags (comma separated)" style="width:100%;margin-bottom:10px;">
                <div style="margin-bottom: 15px;">
                    <label style="display: flex; align-items: center; cursor: pointer;">
                        <input type="checkbox" id="sendEmailNotification" style="margin-right: 8px;">
                        Send email notification to users about this related insight
                    </label>
                </div>
                <button type="submit" class="btn">Save Related Insight</button>
                <button type="button" class="btn" id="cancelRelatedModalBtn" style="background:#aaa;">Cancel</button>
            </form>
        </div>
    </div>
    
    <script src="email-notifications.js"></script>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="nav.js"></script>
    <script src="firebase-config.js"></script>
    <script src="auth-utils.js"></script>
    <script>
        const db = window.db;
        const container = document.querySelector('.container');
        const insightTitle = document.getElementById('insightTitle');
        const insightContent = document.getElementById('insightContent');

        let relatedQuill;

        // Initialize related insight modal
        const relatedModal = document.getElementById('relatedModal');
        const relatedForm = document.getElementById('relatedForm');
        const cancelRelatedBtn = document.getElementById('cancelRelatedModalBtn');

        function openRelatedModal() {
            window.lastRelatedInsightContent = null; // Clear previous draft
            if (window.tinymce && tinymce.get('relatedQuillEditor')) {
                tinymce.get('relatedQuillEditor').remove();
            }
            tinymce.init({
                selector: '#relatedQuillEditor',
                height: 300,
                menubar: false,
                plugins: [
                    'advlist', 'autolink', 'lists', 'link', 'image', 'charmap', 'preview', 'anchor',
                    'searchreplace', 'visualblocks', 'code', 'fullscreen',
                    'insertdatetime', 'media', 'table', 'help', 'wordcount'
                ],
                toolbar: [
                    'undo redo | blocks | bold italic underline strikethrough | forecolor backcolor | alignleft aligncenter alignright alignjustify',
                    'bullist numlist outdent indent | link image table | removeformat | help'
                ],
                content_style: 'body { font-family:Helvetica,Arial,sans-serif; font-size:14px }',
                setup: function(editor) {
                    editor.on('init', function() {
                        if (window.lastRelatedInsightContent) {
                            editor.setContent(window.lastRelatedInsightContent);
                        }
                    });
                }
            });
            relatedModal.style.display = 'block';
        }

        function closeRelatedModal() {
            relatedModal.style.display = 'none';
            relatedForm.reset();
            if (window.tinymce && tinymce.get('relatedQuillEditor')) {
                tinymce.get('relatedQuillEditor').remove();
            }
        }

        cancelRelatedBtn.onclick = closeRelatedModal;

        // Handle related insight form submission
        relatedForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const urlParams = new URLSearchParams(window.location.search);
            const parentId = urlParams.get('id');
            const collectionName = urlParams.get('collection');
            const editorContent = tinymce.get('relatedQuillEditor').getContent();
            if (!editorContent || editorContent.trim() === "") {
                alert("Content cannot be empty.");
                return;
            }
            window.lastRelatedInsightContent = editorContent;
            const insightData = {
                title: document.getElementById('relatedTitle').value,
                content: editorContent,
                tags: document.getElementById('relatedTags').value.split(',').map(t => t.trim()),
                created: firebase.firestore.FieldValue.serverTimestamp(),
                relatedTo: parentId,
                category: collectionName === 'gospelInsights' ? 'Gospel Topics' : 
                         collectionName === 'otherInsights' ? 'Other' : 'Scripture'
            };

            await db.collection(collectionName).add(insightData);
            closeRelatedModal();
            alert('Related insight created successfully!');
        });

        const createRelatedBtn = document.getElementById('createRelatedBtn');

        async function fetchInsight(id, collection) {
            const docRef = db.collection(collection).doc(id);
            const doc = await docRef.get();

            if (doc.exists) {
                const insight = doc.data();
                insightTitle.textContent = insight.title;
                insightContent.innerHTML = insight.content; // Assumes content is safe HTML
            } else {
                insightTitle.textContent = "Insight not found";
                insightContent.innerHTML = "<p>The requested insight could not be found. It may have been moved or deleted.</p>";
            }
        }

        container.style.display = 'none';

        requireAuth().then(({ role }) => {
            container.style.display = 'block';
            if (isEditorOrAdmin(role)) {
                createRelatedBtn.style.display = 'block';
                createRelatedBtn.onclick = openRelatedModal;
            }
            const urlParams = new URLSearchParams(window.location.search);
            const insightId = urlParams.get('id');
            const collectionName = urlParams.get('collection');
            if (insightId && collectionName) {
                fetchInsight(insightId, collectionName);
            } else {
                insightTitle.textContent = "No insight specified";
                insightContent.innerHTML = "<p>Please provide an insight ID in the URL.</p>";
            }
        });

        // Print functionality
        document.getElementById('printBtn').addEventListener('click', () => {
            window.print();
        });

        // Custom table insertion function
        function insertTable(quillInstance) {
            const rows = prompt('Enter number of rows (1-10):', '3');
            const cols = prompt('Enter number of columns (1-10):', '3');
            
            if (rows && cols) {
                const rowCount = Math.min(Math.max(parseInt(rows), 1), 10);
                const colCount = Math.min(Math.max(parseInt(cols), 1), 10);
                
                let tableHTML = '<table style="border-collapse: collapse; width: 100%; margin: 10px 0;">';
                
                for (let i = 0; i < rowCount; i++) {
                    tableHTML += '<tr>';
                    for (let j = 0; j < colCount; j++) {
                        tableHTML += '<td style="border: 1px solid #ddd; padding: 8px; text-align: left;">';
                        tableHTML += '&nbsp;'; // Non-breaking space to ensure cell has content
                        tableHTML += '</td>';
                    }
                    tableHTML += '</tr>';
                }
                
                tableHTML += '</table>';
                
                // Insert the table at current cursor position using a safer method
                const range = quillInstance.getSelection();
                if (range) {
                    // Insert a newline first, then the table
                    quillInstance.insertText(range.index, '\n');
                    quillInstance.clipboard.dangerouslyPasteHTML(range.index + 1, tableHTML);
                    // Add another newline after the table
                    quillInstance.insertText(range.index + 1 + tableHTML.length, '\n');
                    // Set cursor position after the table
                    quillInstance.setSelection(range.index + 1 + tableHTML.length + 1);
                } else {
                    // If no selection, insert at the end
                    const length = quillInstance.getLength();
                    quillInstance.insertText(length, '\n');
                    quillInstance.clipboard.dangerouslyPasteHTML(length + 1, tableHTML);
                    quillInstance.insertText(length + 1 + tableHTML.length, '\n');
                    quillInstance.setSelection(length + 1 + tableHTML.length + 1);
                }
                
                // Ensure the editor maintains focus
                quillInstance.focus();
            }
        }
    </script>
</body>
</html>
